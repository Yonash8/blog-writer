name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  APP_NAME: blog-writer-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    name: deploy
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: |
          if ! flyctl status --app "$APP_NAME" >/dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org "$FLY_ORG"
          fi

      - name: Stage secrets
        run: |
          flyctl secrets set --app "$APP_NAME" --stage \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            PROMPTLAYER_API_KEY="${{ secrets.PROMPTLAYER_API_KEY }}" \
            TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            GHOST_ADMIN_URL="${{ secrets.GHOST_ADMIN_URL }}" \
            GHOST_ADMIN_API_KEY="${{ secrets.GHOST_ADMIN_API_KEY }}" \
            GHOST_AUTHOR_EMAIL="${{ secrets.GHOST_AUTHOR_EMAIL }}" \
            CONSOLE_PASSWORD="${{ secrets.CONSOLE_PASSWORD || secrets.WEB_API_KEY }}" \
            WEB_API_KEY="${{ secrets.WEB_API_KEY }}" \
            WEBHOOK_BASE_URL="https://${APP_NAME}.fly.dev"

      - name: Deploy
        run: |
          flyctl deploy \
            --app "$APP_NAME" \
            --config fly.preview.toml \
            --remote-only \
            --ha=false \
            --strategy immediate \
            --wait-timeout 300

      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            Preview deployed: https://${{ env.APP_NAME }}.fly.dev
            App: `${{ env.APP_NAME }}`
            Commit: `${{ github.event.pull_request.head.sha }}`

      - name: Update PR description with preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: https://${{ env.APP_NAME }}.fly.dev
        run: |
          gh pr view "$PR_NUMBER" --json body -q .body > /tmp/pr_body.txt
          python3 <<'PY' > /tmp/pr_body_new.txt
          import os, re, sys
          with open('/tmp/pr_body.txt') as f:
              body = f.read()
          url = os.environ['PREVIEW_URL']
          block = f"<!-- pr-preview-start -->\nPreview: {url}\n<!-- pr-preview-end -->"
          # Only strip a leading block (anchored at start). Markers appearing in
          # the middle of the body (e.g. documentation) are left alone.
          stripped = re.sub(
              r"\A<!-- pr-preview-start -->.*?<!-- pr-preview-end -->\n*",
              "",
              body,
              flags=re.DOTALL,
          )
          new_body = block + "\n\n" + stripped
          sys.stdout.write(new_body)
          PY
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body_new.txt

  destroy:
    name: destroy
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl apps destroy "$APP_NAME" --yes || true
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            Preview app `${{ env.APP_NAME }}` destroyed.

      - name: Strip preview URL from PR description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body -q .body > /tmp/pr_body.txt
          python3 <<'PY' > /tmp/pr_body_new.txt
          import re, sys
          with open('/tmp/pr_body.txt') as f:
              body = f.read()
          # Only strip a leading block (anchored at start) so docs that
          # mention the markers in body text are preserved.
          new_body = re.sub(
              r"\A<!-- pr-preview-start -->.*?<!-- pr-preview-end -->\n*",
              "",
              body,
              flags=re.DOTALL,
          )
          sys.stdout.write(new_body)
          PY
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body_new.txt
