name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  APP_NAME: blog-writer-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    name: deploy
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: |
          if ! flyctl status --app "$APP_NAME" >/dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org "$FLY_ORG"
          fi

      - name: Stage secrets
        # Push secrets via env vars rather than inline ${{ secrets.X }}
        # substitution so values containing shell metacharacters (e.g. '@',
        # '!', '$') survive the bash command intact. Use `flyctl secrets
        # import` which reads KEY=VALUE lines from stdin and handles quoting.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPTLAYER_API_KEY: ${{ secrets.PROMPTLAYER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DOCS_FOLDER_ID: ${{ secrets.GOOGLE_DOCS_FOLDER_ID }}
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          GHOST_AUTHOR_EMAIL: ${{ secrets.GHOST_AUTHOR_EMAIL }}
          CONSOLE_PASSWORD: ${{ secrets.CONSOLE_PASSWORD }}
          WEB_API_KEY: ${{ secrets.WEB_API_KEY }}
        run: |
          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
            echo "OPENAI_API_KEY=$OPENAI_API_KEY"
            echo "PROMPTLAYER_API_KEY=$PROMPTLAYER_API_KEY"
            echo "TAVILY_API_KEY=$TAVILY_API_KEY"
            echo "GOOGLE_API_KEY=$GOOGLE_API_KEY"
            if [ -n "$GOOGLE_DOCS_FOLDER_ID" ]; then
              echo "GOOGLE_DOCS_FOLDER_ID=$GOOGLE_DOCS_FOLDER_ID"
            fi
            echo "GHOST_ADMIN_URL=$GHOST_ADMIN_URL"
            echo "GHOST_ADMIN_API_KEY=$GHOST_ADMIN_API_KEY"
            echo "GHOST_AUTHOR_EMAIL=$GHOST_AUTHOR_EMAIL"
            # Prefer CONSOLE_PASSWORD; fall back to WEB_API_KEY so existing
            # secret-only setups still gate the preview.
            if [ -n "$CONSOLE_PASSWORD" ]; then
              echo "CONSOLE_PASSWORD=$CONSOLE_PASSWORD"
            elif [ -n "$WEB_API_KEY" ]; then
              echo "CONSOLE_PASSWORD=$WEB_API_KEY"
            fi
            if [ -n "$WEB_API_KEY" ]; then
              echo "WEB_API_KEY=$WEB_API_KEY"
            fi
            echo "WEBHOOK_BASE_URL=https://${APP_NAME}.fly.dev"
          } | flyctl secrets import --app "$APP_NAME" --stage

          # GOOGLE_SERVICE_ACCOUNT_JSON contains literal newlines, which the
          # KEY=VALUE format of `flyctl secrets import` can't represent.
          # Set it separately so the multi-line value is preserved verbatim.
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            flyctl secrets set \
              GOOGLE_SERVICE_ACCOUNT_JSON="$GOOGLE_SERVICE_ACCOUNT_JSON" \
              --app "$APP_NAME" --stage
          fi

      - name: Deploy
        run: |
          flyctl deploy \
            --app "$APP_NAME" \
            --config fly.preview.toml \
            --remote-only \
            --ha=false \
            --strategy immediate \
            --wait-timeout 300

      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            Preview deployed: https://${{ env.APP_NAME }}.fly.dev
            App: `${{ env.APP_NAME }}`
            Commit: `${{ github.event.pull_request.head.sha }}`

      - name: Update PR description with preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: https://${{ env.APP_NAME }}.fly.dev
        run: |
          gh pr view "$PR_NUMBER" --json body -q .body > /tmp/pr_body.txt
          python3 <<'PY' > /tmp/pr_body_new.txt
          import os, re, sys
          with open('/tmp/pr_body.txt') as f:
              body = f.read()
          url = os.environ['PREVIEW_URL']
          block = f"<!-- pr-preview-start -->\nPreview: {url}\n<!-- pr-preview-end -->"
          # Only strip a leading block (anchored at start). Markers appearing in
          # the middle of the body (e.g. documentation) are left alone.
          stripped = re.sub(
              r"\A<!-- pr-preview-start -->.*?<!-- pr-preview-end -->\n*",
              "",
              body,
              flags=re.DOTALL,
          )
          new_body = block + "\n\n" + stripped
          sys.stdout.write(new_body)
          PY
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body_new.txt

  destroy:
    name: destroy
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl apps destroy "$APP_NAME" --yes || true
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            Preview app `${{ env.APP_NAME }}` destroyed.

      - name: Strip preview URL from PR description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body -q .body > /tmp/pr_body.txt
          python3 <<'PY' > /tmp/pr_body_new.txt
          import re, sys
          with open('/tmp/pr_body.txt') as f:
              body = f.read()
          # Only strip a leading block (anchored at start) so docs that
          # mention the markers in body text are preserved.
          new_body = re.sub(
              r"\A<!-- pr-preview-start -->.*?<!-- pr-preview-end -->\n*",
              "",
              body,
              flags=re.DOTALL,
          )
          sys.stdout.write(new_body)
          PY
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body_new.txt
